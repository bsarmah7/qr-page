<!DOCTYPE html>
<html>
<head>
    <title>QR Code Generator</title>

    <!-- QR Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            padding: 20px;
        }

        h2 {
            color: #333;
        }

        input {
            width: 260px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #qrcode img {
            margin-top: 20px;
            border: 5px solid white;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        .note {
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

    <h2>QR Code Generator</h2>

    <input type="text" id="text" placeholder="Enter your text">
    <br>

    <button onclick="generateQR()">Generate QR</button>
    <button onclick="downloadQR()">Download</button>

    <div id="qrcode"></div>

    <p class="note">
        If download doesn't start, tap download → long press image → Save Image
    </p>

    <script>
        let qrCanvas;

        function generateQR() {
            let data = document.getElementById("text").value.trim();

            if (!data) {
                alert("Please enter some text");
                return;
            }

            let url = "https://bsarmah7.github.io/qr-page/view.html?data=" + encodeURIComponent(data);

            let container = document.getElementById("qrcode");
            container.innerHTML = "";

            let tempDiv = document.createElement("div");

            new QRCode(tempDiv, {
                text: url,
                width: 220,
                height: 220
            });

            // Wait for QR to render
            setTimeout(() => {
                let canvas = tempDiv.querySelector("canvas");

                if (!canvas) {
                    alert("QR generation failed");
                    return;
                }

                qrCanvas = canvas;

                let img = document.createElement("img");
                img.src = canvas.toDataURL("image/png");
                img.style.width = "220px";

                container.innerHTML = "";
                container.appendChild(img);
            }, 200);
        }

        function downloadQR() {
            let img = document.querySelector("#qrcode img");

            if (!img) {
                alert("Generate QR first!");
                return;
            }

            // Reliable mobile-friendly method
            window.open(img.src, "_blank");
        }
    </script>

</body>
</html>
