<!DOCTYPE html>
<html>
<head>
    <title>QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body style="text-align:center; font-family:Arial;">

    <h2>QR Code Generator</h2>

    <input type="text" id="text" placeholder="Enter your text" style="width:250px; padding:8px;">
    <br><br>

    <button onclick="generateQR()">Generate QR</button>

    <div id="qrcode" style="margin-top:20px;"></div>

    <br>
    <button onclick="downloadQR()">Download</button>

    <script>
        let qr;

        function generateQR() {
            let data = document.getElementById("text").value;

            let url = "https://bsarmah7.github.io/qr-page/view.html?data=" + encodeURIComponent(data);

            document.getElementById("qrcode").innerHTML = "";
            
            let tempDiv = document.createElement("div");
            
            let qr = new QRCode(tempDiv, {
                text: url,
                width: 220,
                height: 220
            });

            setTimeout(() => {
                qrCanvas = tempDiv.querySelector("canvas");

                let img = document.createElement("img");
                img.src = qrCanvas.toDataURL("image/png");
                img.style.width = "220px";
                
                let container = document.getElementById("qrcode");
                container.innerHTML = "";
                container.appendChild(img);
            }, 300);
        }

        function downloadQR() {
            const canvas = document.querySelector("#qrcode canvas");

            if (!canvas) {
                alert("Generate QR first!");
                return;
            }

            let image = canvas.toDataURL("image/png");
            let link = document.createElement("a");
            link.href = img.src;
            link.download = "qr_code.png";   // PNG download

            try {
                link.click();
            } catch (e) {}

    // Fallback: open image in new tab for manual save
            setTimeout(() => {
                window.open(image, "_blank");
            }, 200);
        }
    </script>

</body>
</html>
