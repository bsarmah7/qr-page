<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Text Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #qrcode { margin: 20px; }
        #viewer { display: none; text-align: center; }
        textarea { width: 300px; height: 100px; margin-bottom: 10px; }
        .hidden { display: none; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- SECTION 1: GENERATOR -->
    <div id="generator">
        <h2>Generate QR Text</h2>
        <textarea id="text-input" placeholder="Type your message here..."></textarea><br>
        <button onclick="generateQR()">Generate & Show Download</button>
        
        <div id="qrcode"></div>
        <button id="download-btn" class="hidden" onclick="downloadQR()">Download as PNG</button>
    </div>

    <!-- SECTION 2: VIEWER (Shown when scanned) -->
    <div id="viewer">
        <h2>Message Received:</h2>
        <p id="display-text" style="font-size: 1.5rem; color: #333;"></p>
        <button onclick="window.location.href=window.location.origin + window.location.pathname">Create your own</button>
    </div>

    <script>
        // Check if there is a message in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const sharedText = urlParams.get('msg');

        if (sharedText) {
            document.getElementById('generator').classList.add('hidden');
            document.getElementById('viewer').style.display = 'block';
            document.getElementById('display-text').innerText = decodeURIComponent(sharedText);
        }

        function generateQR() {
            const input = document.getElementById('text-input').value;
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = ""; // Clear old QR

            if (!input) return alert("Please enter some text");

            // Create the link that the QR will point to
            const baseUrl = window.location.href.split('?')[0];
            const fullLink = `${baseUrl}?msg=${encodeURIComponent(input)}`;

            new QRCode(qrDiv, {
                text: fullLink,
                width: 256,
                height: 256
            });

            document.getElementById('download-btn').classList.remove('hidden');
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = 'my-qr-code.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            }
        }
    </script>
</body>
</html>
