<!DOCTYPE html>
<html>
<head>
    <title>QR Data</title>
</head>

<body style="text-align:center; font-family:Arial;">

    <h2>QR Content</h2>
    <p id="output"></p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const data = params.get("data");

        document.getElementById("output").innerText = data || "No data found";
    </script>

</body>
</html>
