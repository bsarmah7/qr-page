<!DOCTYPE html>
<html>
<head>
    <title>QR Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="text-align:center; font-family:Arial; padding:20px;">

    <h2>QR Code Generator</h2>

    <textarea id="text" id="text" placeholder="Enter your text" style="padding:10px; width:250px;
        height: 120px;"></textarea>
    <br><br>

    <button onclick="generateQR()">Generate QR</button>

    <div id="qrcode" style="margin-top:20px;"></div>

    <script>
        function generateQR() {
            let data = document.getElementById("text").value.trim();

            if (!data) {
                alert("Enter text first");
                return;
            }

            let url = "https://bsarmah7.github.io/qr-page/view.html?data=" + encodeURIComponent(data);

            let qrImageURL = "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + encodeURIComponent(url);

            document.getElementById("qrcode").innerHTML =
                `<img src="${qrImageURL}" style="margin-top:20px;">`;
        }
    </script>

</body>
</html>
